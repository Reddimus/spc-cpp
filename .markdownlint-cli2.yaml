config:
  default: true
  MD013: false
  MD033: false
  MD040: false
  MD041: false
  MD060: false
  # MD004 disables ul-style enforcement so a literal "+" at the start of
  # an indented continuation line isn't misread as a "+"-style list item.
  MD004: false
  MD024:
    siblings_only: true
globs:
  - "**/*.md"
  - "!**/node_modules/**"
  - "!**/build*/**"
  - "!**/.git/**"
  - "!**/_deps/**"
  - "!**/vendor/**"
  - "!**/.venv/**"
  - "!**/*.egg-info/**"
